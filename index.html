  {c:"主",m:"주인",s:"주"},{c:"住",m:"살",s:"주"},{c:"重",m:"무거울",s:"중"},{c:"地",m:"땅",s:"지"},{c:"紙",m:"종이",s:"지"},
  {c:"直",m:"곧을",s:"직"},{c:"川",m:"내",s:"천"},{c:"千",m:"일천",s:"천"},{c:"天",m:"하늘",s:"천"},{c:"草",m:"풀",s:"초"},
  {c:"村",m:"마을",s:"촌"},{c:"秋",m:"가을",s:"추"},{c:"春",m:"봄",s:"춘"},{c:"出",m:"날",s:"출"},{c:"便",m:"편할",s:"편"},
  {c:"平",m:"평평할",s:"평"},{c:"下",m:"아래",s:"하"},{c:"夏",m:"여름",s:"하"},{c:"漢",m:"한수",s:"한"},{c:"海",m:"바다",s:"해"},
  {c:"話",m:"말씀",s:"화"},{c:"活",m:"살",s:"활"},{c:"花",m:"꽃",s:"화"},{c:"孝",m:"효도",s:"효"},{c:"後",m:"뒤",s:"후"},
  {c:"休",m:"쉴",s:"휴"},{c:"有",m:"있을",s:"유"},{c:"育",m:"기를",s:"육"},{c:"邑",m:"고을",s:"읍"},
];

const ALL_8 = LEVEL_8.map(h=>({...h,lv:8}));
const ALL_7N = LEVEL_7_NEW.map(h=>({...h,lv:7}));
const ALL_HANJA = [...ALL_8,...ALL_7N];
const TIMER_SEC = 5;

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
const EMOJIS=["🐉","🐯","🦊","🐼","🐥","🦁","🐸","🐰","🌸","⭐","🌈","🎋","🏮","✨","🌟"];

const TITLES=[
  {min:0,title:"한자 알",emoji:"🥚",color:"#e0e0e0"},
  {min:30,title:"한자 병아리",emoji:"🐣",color:"#fff9c4"},
  {min:80,title:"한자 수련생",emoji:"🐥",color:"#ffe082"},
  {min:150,title:"한자 학도",emoji:"🦊",color:"#ffcc80"},
  {min:250,title:"한자 초급자",emoji:"🐯",color:"#ffab91"},
  {min:400,title:"한자 중급자",emoji:"🦁",color:"#ef9a9a"},
  {min:600,title:"한자 고급자",emoji:"🐉",color:"#ce93d8"},
  {min:900,title:"한자 달인",emoji:"🏯",color:"#90caf9"},
  {min:1300,title:"한자 마스터",emoji:"👑",color:"#ffd54f"},
];

function getLevel(pts){let t=TITLES[0],idx=0;for(let i=0;i<TITLES.length;i++){if(pts>=TITLES[i].min){t=TITLES[i];idx=i;}}const next=idx+1<TITLES.length?TITLES[idx+1]:null;const pct=next?Math.min(100,((pts-t.min)/(next.min-t.min))*100):100;return{...t,lvl:idx+1,next,pct,pts,idx};}
function loadPts(){try{return parseInt(localStorage.getItem("fc_pts")||"0");}catch{return 0;}}
function savePts(p){try{localStorage.setItem("fc_pts",p.toString());}catch{}}

function FlashcardApp(){
  const[screen,setScreen]=useState("start");
  const[cards,setCards]=useState([]);
  const[idx,setIdx]=useState(0);
  const[phase,setPhase]=useState("show");
  const[timer,setTimer]=useState(TIMER_SEC);
  const[knew,setKnew]=useState(0);
  const[didntKnow,setDidntKnow]=useState(0);
  const[cardCount,setCardCount]=useState(20);
  const[isFlipping,setIsFlipping]=useState(false);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBestStreak]=useState(0);
  const[particles,setParticles]=useState([]);
  const[totalPts,setTotalPts]=useState(()=>loadPts());
  const[earnedPts,setEarnedPts]=useState(0);
  const[showLevelUp,setShowLevelUp]=useState(null);
  const[showResetConfirm,setShowResetConfirm]=useState(false);
  const[practiceCards,setPracticeCards]=useState([]);
  const[practiceIdx,setPracticeIdx]=useState(0);
  const[practiceRevealed,setPracticeRevealed]=useState(false);
  const[practiceFlipping,setPracticeFlipping]=useState(false);
  const timerRef=useRef(null);
  const prevLvl=useRef(getLevel(loadPts()).lvl);
  const curLevel=getLevel(totalPts);

  const startGame=(count)=>{
    setCards(shuffle(ALL_HANJA).slice(0,count));
    setIdx(0);setPhase("show");setTimer(TIMER_SEC);setKnew(0);setDidntKnow(0);
    setStreak(0);setBestStreak(0);setIsFlipping(false);setCardCount(count);setEarnedPts(0);
    prevLvl.current=curLevel.lvl;setScreen("play");
  };

  const startPractice=(count,lvFilter)=>{
    const pool = lvFilter ? ALL_HANJA.filter(h=>h.lv===lvFilter) : ALL_HANJA;
    setPracticeCards(shuffle(pool).slice(0,Math.min(count,pool.length)));
    setPracticeIdx(0);setPracticeRevealed(false);setPracticeFlipping(false);
    setScreen("practice");
  };

  const resetLevel=()=>{
    setTotalPts(0);savePts(0);setShowResetConfirm(false);prevLvl.current=1;
  };

  useEffect(()=>{
    if(screen!=="play"||phase!=="show")return;
    if(timer<=0){setIsFlipping(true);setTimeout(()=>{setPhase("reveal");setIsFlipping(false);},400);return;}
    timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);
    return()=>clearTimeout(timerRef.current);
  },[screen,phase,timer]);

  const skipToReveal=()=>{clearTimeout(timerRef.current);setIsFlipping(true);setTimeout(()=>{setPhase("reveal");setIsFlipping(false);},400);};

  const spawnParticles=()=>{setParticles(Array.from({length:8},(_,i)=>({id:Date.now()+i,emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],x:30+Math.random()*40,y:20+Math.random()*30,d:Math.random()*0.3})));setTimeout(()=>setParticles([]),1500);};

  const answer=(known)=>{
    let add=0;
    if(known){setKnew(k=>k+1);const ns=streak+1;setStreak(ns);if(ns>bestStreak)setBestStreak(ns);if(ns>=3)spawnParticles();add=ns>=5?5:ns>=3?3:2;}
    else{setDidntKnow(d=>d+1);setStreak(0);add=1;}
    const np=totalPts+add;setTotalPts(np);setEarnedPts(e=>e+add);savePts(np);
    const nl=getLevel(np).lvl;
    if(nl>prevLvl.current){prevLvl.current=nl;setShowLevelUp(getLevel(np));setTimeout(()=>setShowLevelUp(null),2500);}
    if(idx+1>=cards.length)setScreen("done");
    else{setIsFlipping(true);setTimeout(()=>{setIdx(i=>i+1);setPhase("show");setTimer(TIMER_SEC);setIsFlipping(false);},350);}
  };

  const card=cards[idx];
  const progress=cards.length>0?((idx+(phase==="reveal"?1:0.5))/cards.length)*100:0;

  // ─── LEVEL MAP ───
  if(screen==="map") return(
    <div style={S.container}><style>{CSS}</style>
      <div style={{...S.topBar,justifyContent:"space-between"}}>
        <button onClick={()=>setScreen("start")} style={S.backBtn}>←</button>
        <div style={{fontSize:"17px",fontWeight:"800",color:"#5d4037"}}>🗺️ 레벨 지도</div>
        <div style={{width:"36px"}}/>
      </div>
      <div style={{padding:"12px 20px",textAlign:"center"}}>
        <div style={{fontSize:"13px",color:"#8d6e63"}}>현재 포인트</div>
        <div style={{fontSize:"30px",fontWeight:"900",color:"#8b4513"}}>{totalPts} pt</div>
      </div>
      <div style={{padding:"0 20px 40px",position:"relative"}}>
        <div style={{position:"absolute",left:"39px",top:0,bottom:"40px",width:"4px",background:"#e0d5c8",borderRadius:"2px",zIndex:0}}/>
        {TITLES.map((t,i)=>{
          const reached=totalPts>=t.min;const isCur=curLevel.idx===i;const isNext=curLevel.idx===i-1;
          return(<div key={i} style={{display:"flex",alignItems:"center",gap:"14px",marginBottom:"10px",position:"relative",zIndex:1}}>
            <div style={{width:"42px",height:"42px",borderRadius:"50%",flexShrink:0,background:reached?`linear-gradient(135deg,${t.color},${t.color}dd)`:"#e8ddd0",border:isCur?"3px solid #8b4513":isNext?"3px dashed #cd853f":"3px solid transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:reached?"22px":"16px",boxShadow:isCur?"0 0 16px rgba(139,69,19,0.3)":"none"}}>
              {reached?t.emoji:"🔒"}
            </div>
            <div style={{flex:1,background:isCur?"#fffdf8":reached?"#faf6ef":"#f0ebe3",borderRadius:"14px",padding:"12px 14px",border:isCur?"2px solid #cd853f":"1px solid rgba(201,184,150,0.2)",boxShadow:isCur?"0 4px 16px rgba(139,69,19,0.1)":"none",opacity:reached?1:0.55}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:"13px",fontWeight:"800",color:reached?"#5d4037":"#a09080"}}>Lv.{i+1} {t.title}</div>
                  <div style={{fontSize:"10px",color:"#a09080",marginTop:"1px"}}>{t.min===0?"시작!":`${t.min}pt 이상`}</div>
                </div>
                {isCur&&<div style={{background:"#8b4513",color:"#fff",padding:"2px 8px",borderRadius:"10px",fontSize:"10px",fontWeight:"700"}}>현재</div>}
                {reached&&!isCur&&<span style={{fontSize:"14px"}}>✅</span>}
              </div>
              {isCur&&curLevel.next&&(<div style={{marginTop:"6px"}}>
                <div style={{height:"5px",background:"#e8ddd0",borderRadius:"3px",overflow:"hidden"}}>
                  <div style={{width:`${curLevel.pct}%`,height:"100%",background:`linear-gradient(90deg,#cd853f,#ff9800)`,borderRadius:"3px"}}/>
                </div>
                <div style={{fontSize:"10px",color:"#a09080",marginTop:"2px"}}>다음 레벨까지 {curLevel.next.min-totalPts}pt</div>
              </div>)}
            </div>
          </div>);
        })}
        {/* Reset button */}
        <div style={{marginTop:"16px",textAlign:"center"}}>
          {!showResetConfirm ? (
            <button onClick={()=>setShowResetConfirm(true)} style={{background:"none",border:"none",color:"#b0a090",fontSize:"12px",cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif",padding:"8px"}}>레벨 초기화</button>
          ) : (
            <div style={{background:"#fff5f5",border:"2px solid #e88",borderRadius:"14px",padding:"14px",textAlign:"center"}}>
              <div style={{fontSize:"13px",fontWeight:"700",color:"#c44",marginBottom:"10px"}}>정말 레벨과 포인트를 초기화할까요?</div>
              <div style={{display:"flex",gap:"8px",justifyContent:"center"}}>
                <button onClick={resetLevel} style={{padding:"8px 20px",borderRadius:"10px",border:"none",background:"#c44",color:"#fff",fontSize:"13px",fontWeight:"700",cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif"}}>네, 초기화</button>
                <button onClick={()=>setShowResetConfirm(false)} style={{padding:"8px 20px",borderRadius:"10px",border:"2px solid #e0d5c8",background:"#fff",color:"#7a6b5a",fontSize:"13px",fontWeight:"700",cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif"}}>취소</button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );

  // ─── START ───
  if(screen==="start") return(
    <div style={S.container}><style>{CSS}</style>
      <div style={S.startWrap}>
        <div style={S.levelCard}>
          <div style={{fontSize:"44px"}}>{curLevel.emoji}</div>
          <div style={{flex:1}}>
            <div style={{fontSize:"12px",color:"#8d6e63",fontWeight:"600"}}>Lv.{curLevel.lvl}</div>
            <div style={{fontSize:"16px",fontWeight:"800",color:"#5d4037"}}>{curLevel.title}</div>
            <div style={{height:"6px",background:"#e8ddd0",borderRadius:"3px",marginTop:"5px",overflow:"hidden"}}>
              <div style={{width:`${curLevel.pct}%`,height:"100%",background:"linear-gradient(90deg,#cd853f,#ff9800)",borderRadius:"3px"}}/>
            </div>
            <div style={{fontSize:"11px",color:"#a09080",marginTop:"3px"}}>{curLevel.next?`다음 레벨까지 ${curLevel.next.min-totalPts}pt`:"최고 레벨!"} · 총 {totalPts}pt</div>
          </div>
        </div>
        <button onClick={()=>setScreen("map")} style={S.mapBtn}>🗺️ 레벨 지도 보기</button>
        <div style={S.logoCircle}><span style={{fontSize:"56px"}}>🃏</span></div>
        <h1 style={S.title}>한자 플래시카드</h1>
        <p style={S.subtitle}>8급 {LEVEL_8.length}자 + 7급 신출 {LEVEL_7_NEW.length}자 = 총 {ALL_HANJA.length}자</p>
        <p style={S.desc}>한자가 5초 동안 보여요.<br/>뜻과 음을 떠올린 후 확인해 보세요!</p>
        <div style={S.countSection}>
          <p style={S.countLabel}>몇 장 할까요?</p>
          <div style={S.countGrid}>
            {[10,20,50,ALL_HANJA.length].map(n=>{const v=Math.min(n,ALL_HANJA.length);return(
              <button key={n} onClick={()=>startGame(v)} style={S.countBtn}>
                <span style={S.countNum}>{v}</span>
                <span style={S.countSub}>{n<=10?"가볍게":n<=20?"적당히":n<=50?"열심히":"전부!"}</span>
              </button>);})}
          </div>
        </div>
        <div style={S.howto}>
          {[["1","한자를 5초 동안 보면서 뜻·음을 떠올려요"],["2","자동으로 뒤집혀서 정답이 나와요"],["3","알았으면 ⭕, 몰랐으면 ❌ 를 눌러요"]].map(([n,t])=>(
            <div key={n} style={S.howtoStep}><span style={S.stepNum}>{n}</span><span>{t}</span></div>))}
        </div>

        {/* Practice mode */}
        <div style={{width:"100%",marginTop:"16px"}}>
          <p style={{fontSize:"14px",fontWeight:"700",color:"#5d4037",marginBottom:"8px",textAlign:"center"}}>📖 연습 모드 (포인트 없이 공부만)</p>
          <div style={{display:"flex",gap:"8px"}}>
            <button onClick={()=>startPractice(ALL_HANJA.length,null)} style={{...S.countBtn,flex:1,border:"2px solid #8d6e63"}}>
              <span style={{fontSize:"14px",fontWeight:"800",color:"#8d6e63"}}>전체 {ALL_HANJA.length}자</span>
            </button>
            <button onClick={()=>startPractice(50,8)} style={{...S.countBtn,flex:1,border:"2px solid #2e7d32"}}>
              <span style={{fontSize:"14px",fontWeight:"800",color:"#2e7d32"}}>8급 50자</span>
            </button>
            <button onClick={()=>startPractice(LEVEL_7_NEW.length,7)} style={{...S.countBtn,flex:1,border:"2px solid #e65100"}}>
              <span style={{fontSize:"14px",fontWeight:"800",color:"#e65100"}}>7급 {LEVEL_7_NEW.length}자</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  // ─── PRACTICE ───
  if(screen==="practice"&&practiceCards.length>0){
    const pc=practiceCards[practiceIdx];
    const pProgress=((practiceIdx+(practiceRevealed?1:0.5))/practiceCards.length)*100;

    const practiceNext=()=>{
      if(practiceIdx+1>=practiceCards.length){setScreen("start");return;}
      setPracticeFlipping(true);
      setTimeout(()=>{setPracticeIdx(i=>i+1);setPracticeRevealed(false);setPracticeFlipping(false);},300);
    };
    const practiceReveal=()=>{
      setPracticeFlipping(true);
      setTimeout(()=>{setPracticeRevealed(true);setPracticeFlipping(false);},300);
    };

    return(
      <div style={S.container}><style>{CSS}</style>
        <div style={S.topBar}>
          <button onClick={()=>setScreen("start")} style={S.backBtn}>✕</button>
          <div style={{fontSize:"14px",fontWeight:"700",color:"#8d6e63"}}>📖 연습 모드</div>
          <div style={S.counter}>{practiceIdx+1}/{practiceCards.length}</div>
        </div>
        <div style={S.progressTrack}><div style={{...S.progressFill,width:`${pProgress}%`,background:"linear-gradient(90deg,#8d6e63,#a1887f)"}}/></div>
        <div style={S.cardArea}>
          <div style={{...S.card,transform:practiceFlipping?"rotateY(90deg)":"rotateY(0deg)",transition:"transform 0.3s ease-in-out"}}>
            {!practiceRevealed?(<>
              <div style={{...S.lvBadge,background:pc.lv===8?"#e8f5e9":"#fff3e0",color:pc.lv===8?"#2e7d32":"#e65100"}}>{pc.lv}급</div>
              <div style={S.hanjaChar}>{pc.c}</div>
              <p style={S.thinkText}>뜻과 음을 떠올려 보세요</p>
              <button onClick={practiceReveal} style={{...S.skipBtn,background:"#8d6e63",color:"#fff",border:"none",padding:"12px 32px",fontSize:"15px"}}>뒤집기 👀</button>
            </>):(<>
              <div style={{...S.lvBadge,background:pc.lv===8?"#e8f5e9":"#fff3e0",color:pc.lv===8?"#2e7d32":"#e65100"}}>{pc.lv}급</div>
              <div style={S.revealChar}>{pc.c}</div>
              <div style={S.infoRow}>
                <div style={S.infoBox}><div style={S.infoLabel}>뜻 (훈)</div><div style={S.infoValue}>{pc.m}</div></div>
                <div style={S.infoDivider}/>
                <div style={S.infoBox}><div style={S.infoLabel}>음</div><div style={S.infoValue}>{pc.s}</div></div>
              </div>
              <button onClick={practiceNext} style={{width:"100%",padding:"16px",borderRadius:"16px",border:"none",background:"linear-gradient(135deg,#8d6e63,#a1887f)",color:"#fff",fontSize:"16px",fontWeight:"700",cursor:"pointer",fontFamily:"'Noto Sans KR',sans-serif",boxShadow:"0 4px 16px rgba(0,0,0,0.1)"}}>
                {practiceIdx+1>=practiceCards.length?"✅ 연습 끝!":"다음 카드 →"}
              </button>
            </>)}
          </div>
        </div>
      </div>
    );
  }

  // ─── PLAY ───
  if(screen==="play"&&card) return(
    <div style={S.container}><style>{CSS}</style>
      {showLevelUp&&(<div onClick={()=>setShowLevelUp(null)} style={S.overlay}><div style={S.popup}>
        <div style={{fontSize:"64px",marginBottom:"12px"}}>{showLevelUp.emoji}</div>
        <div style={{fontSize:"22px",fontWeight:"900",color:"#8b4513",marginBottom:"6px"}}>레벨 업!</div>
        <div style={{fontSize:"18px",fontWeight:"700",color:"#5d4037"}}>Lv.{showLevelUp.lvl} {showLevelUp.title}</div>
      </div></div>)}
      {particles.map(p=>(<div key={p.id} style={{position:"fixed",left:`${p.x}%`,top:`${p.y}%`,fontSize:"32px",animation:`particleFly 1.2s ease-out ${p.d}s forwards`,opacity:0,zIndex:999,pointerEvents:"none"}}>{p.emoji}</div>))}
      <div style={S.topBar}>
        <button onClick={()=>setScreen("start")} style={S.backBtn}>✕</button>
        <div style={{display:"flex",alignItems:"center",gap:"6px"}}><span style={{fontSize:"16px"}}>{curLevel.emoji}</span><span style={{fontSize:"13px",fontWeight:"700",color:"#cd853f"}}>+{earnedPts}pt</span></div>
        <div style={S.counter}>{idx+1}/{cards.length}</div>
        {streak>=3&&<div style={S.streakBadge}>🔥{streak}</div>}
      </div>
      <div style={S.progressTrack}><div style={{...S.progressFill,width:`${progress}%`}}/></div>
      <div style={S.cardArea}>
        <div style={{...S.card,transform:isFlipping?"rotateY(90deg)":"rotateY(0deg)",transition:"transform 0.35s ease-in-out"}}>
          {phase==="show"?(<>
            <div style={S.timerWrap}>
              <svg width="56" height="56" viewBox="0 0 56 56"><circle cx="28" cy="28" r="24" fill="none" stroke="#e8ddd0" strokeWidth="4"/>
              <circle cx="28" cy="28" r="24" fill="none" stroke="#cd853f" strokeWidth="4" strokeDasharray={2*Math.PI*24} strokeDashoffset={2*Math.PI*24*(1-timer/TIMER_SEC)} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear",transform:"rotate(-90deg)",transformOrigin:"center"}}/></svg>
              <span style={S.timerNum}>{timer}</span>
            </div>
            <div style={{...S.lvBadge,background:card.lv===8?"#e8f5e9":"#fff3e0",color:card.lv===8?"#2e7d32":"#e65100"}}>{card.lv}급</div>
            <div style={S.hanjaChar} className="charPulse">{card.c}</div>
            <p style={S.thinkText}>뜻과 음을 떠올려 보세요...</p>
            <button onClick={skipToReveal} style={S.skipBtn}>바로 확인하기 →</button>
          </>):(<>
            <div style={{...S.lvBadge,background:card.lv===8?"#e8f5e9":"#fff3e0",color:card.lv===8?"#2e7d32":"#e65100"}}>{card.lv}급</div>
            <div style={S.revealChar}>{card.c}</div>
            <div style={S.infoRow}>
              <div style={S.infoBox}><div style={S.infoLabel}>뜻 (훈)</div><div style={S.infoValue}>{card.m}</div></div>
              <div style={S.infoDivider}/>
              <div style={S.infoBox}><div style={S.infoLabel}>음</div><div style={S.infoValue}>{card.s}</div></div>
            </div>
            <div style={S.answerRow}>
              <button onClick={()=>answer(false)} style={S.noBtn}><span style={{fontSize:"28px"}}>❌</span><span>몰랐어요</span></button>
              <button onClick={()=>answer(true)} style={S.yesBtn}><span style={{fontSize:"28px"}}>⭕</span><span>알았어요!</span></button>
            </div>
          </>)}
        </div>
      </div>
    </div>
  );

  // ─── DONE ───
  if(screen==="done"){
    const total=knew+didntKnow,pct=total>0?Math.round((knew/total)*100):0;
    const g=pct>=90?{e:"🏆",m:"완벽해요!",s:"한자 천재!"}:pct>=70?{e:"🎉",m:"잘했어요!",s:"조금만 더 하면 완벽!"}:pct>=50?{e:"💪",m:"좋은 시작이에요!",s:"계속 연습하면 금방 늘어요"}:{e:"📚",m:"힘내요!",s:"다시 한번 도전해 봐요"};
    return(
      <div style={S.container}><style>{CSS}</style>
        <div style={S.doneWrap}>
          <div style={{fontSize:"72px",marginBottom:"10px",animation:"popIn 0.5s ease"}}>{g.e}</div>
          <h2 style={S.doneTitle}>{g.m}</h2><p style={S.doneSub}>{g.s}</p>
          <div style={S.scoreCard}>
            <div style={S.scoreCircle}>
              <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="#e8ddd0" strokeWidth="8"/>
              <circle cx="60" cy="60" r="50" fill="none" stroke={pct>=70?"#4caf50":pct>=50?"#ff9800":"#ef5350"} strokeWidth="8" strokeDasharray={2*Math.PI*50} strokeDashoffset={2*Math.PI*50*(1-pct/100)} strokeLinecap="round" style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset 1.5s ease"}}/></svg>
              <div style={S.scoreText}>{pct}%</div>
            </div>
            <div style={S.statRow}>
              <div style={S.statBox}><div style={{fontSize:"24px",fontWeight:"800",color:"#4caf50"}}>{knew}</div><div style={{fontSize:"11px",color:"#7a6b5a"}}>알았어요</div></div>
              <div style={{width:"1px",background:"#e8ddd0",alignSelf:"stretch"}}/>
              <div style={S.statBox}><div style={{fontSize:"24px",fontWeight:"800",color:"#ef5350"}}>{didntKnow}</div><div style={{fontSize:"11px",color:"#7a6b5a"}}>몰랐어요</div></div>
              <div style={{width:"1px",background:"#e8ddd0",alignSelf:"stretch"}}/>
              <div style={S.statBox}><div style={{fontSize:"24px",fontWeight:"800",color:"#ff9800"}}>{bestStreak}</div><div style={{fontSize:"11px",color:"#7a6b5a"}}>최고연속🔥</div></div>
            </div>
          </div>
          <div style={S.doneLvCard}>
            <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
              <span style={{fontSize:"34px"}}>{curLevel.emoji}</span>
              <div style={{flex:1}}>
                <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:"14px",fontWeight:"800",color:"#5d4037"}}>Lv.{curLevel.lvl} {curLevel.title}</span><span style={{fontSize:"14px",fontWeight:"700",color:"#cd853f"}}>+{earnedPts}pt</span></div>
                <div style={{height:"6px",background:"#e8ddd0",borderRadius:"3px",marginTop:"5px",overflow:"hidden"}}><div style={{width:`${curLevel.pct}%`,height:"100%",background:"linear-gradient(90deg,#cd853f,#ff9800)",borderRadius:"3px",transition:"width 1s"}}/></div>
                <div style={{fontSize:"11px",color:"#a09080",marginTop:"3px"}}>{curLevel.next?`다음: ${curLevel.next.emoji} ${curLevel.next.title} (${curLevel.next.min-totalPts}pt)`:"최고 레벨!"} · 총 {totalPts}pt</div>
              </div>
            </div>
          </div>
          <div style={S.doneButtons}>
            <button onClick={()=>startGame(cardCount)} style={S.retryBtn}>🔄 다시 도전!</button>
            <button onClick={()=>setScreen("start")} style={S.homeBtn}>🏠 처음으로</button>
          </div>
        </div>
      </div>
    );
  }
  return null;
}
